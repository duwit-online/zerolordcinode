# .github/workflows/android.yml

name: Build Android APK

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install Dependencies
      - name: Install Dependencies
        run: npm install

      # Build Vite/Lovable App
      - name: Build Web App
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://163.254.193.7:3000' }}

      # Verify dist folder exists
      - name: Verify Build Output
        run: |
          echo "Checking dist folder..."
          ls -la
          ls -la dist

      # Setup Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Install Capacitor Android Platform
      - name: Install Capacitor Android
        run: npm install @capacitor/android @capacitor/cli

      # Generate Android Project If Missing
      - name: Create Android Project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # Sync Built Web Assets Into Android
      - name: Sync Capacitor
        run: npx cap sync android

      # Build Debug APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cinode-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
